<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generation Timeline / Oś Pokoleń</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede8;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#9a9993;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius:10px;--radius-sm:6px;
  --shadow:0 2px 20px rgba(0,0,0,0.10);
  --accent:#0f3460;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#f0efe9;--text2:#a8a79f;--text3:#6a6963;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;padding:2rem 1rem;}
.app{max-width:980px;margin:0 auto;background:var(--bg);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;}
.app-header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:2rem 2.5rem;color:#fff;position:relative;}
.app-eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:6px;}
.app-title{font-size:26px;font-weight:700;margin-bottom:4px;}
.app-sub{font-size:13px;color:rgba(255,255,255,0.55);}
.lang-switcher{position:absolute;top:1.5rem;right:2rem;display:flex;border-radius:20px;overflow:hidden;border:1.5px solid rgba(255,255,255,0.25);}
.lang-btn{padding:5px 16px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.5);transition:all 0.15s;letter-spacing:0.05em;}
.lang-btn.active{background:rgba(255,255,255,0.18);color:#fff;}
.lang-btn:hover:not(.active){color:rgba(255,255,255,0.85);}
.app-body{padding:1.5rem 2rem;}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.filter-btn{font-size:11px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all 0.15s;font-family:inherit;}
.filter-btn:hover{background:var(--bg2);color:var(--text);}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* ZOOM CONTROLS */
.zoom-bar{display:flex;align-items:center;gap:8px;margin-bottom:0.75rem;padding:8px 12px;background:var(--bg2);border-radius:var(--radius-sm);border:1px solid var(--border);}
.zoom-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-family:inherit;font-weight:600;}
.zoom-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.zoom-label{font-family:monospace;font-size:11px;color:var(--text3);min-width:42px;text-align:center;}
.zoom-slider{flex:1;accent-color:var(--accent);cursor:pointer;height:4px;}
.zoom-reset{font-size:10px;padding:4px 10px;border-radius:14px;border:1px solid var(--border2);background:var(--bg);color:var(--text3);cursor:pointer;font-family:inherit;transition:all 0.15s;}
.zoom-reset:hover{border-color:var(--accent);color:var(--accent);}
.zoom-hint{font-size:10px;color:var(--text3);margin-left:auto;}

/* TIMELINE */
.timeline-wrap{overflow:hidden;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:1rem;}
.axis-row{display:flex;align-items:center;background:var(--bg2);border-bottom:1px solid var(--border);}
.label-col{width:165px;min-width:165px;flex-shrink:0;}
.tick-area{flex:1;position:relative;height:24px;overflow:hidden;}
.tick{position:absolute;font-size:9px;color:var(--text3);transform:translateX(-50%);user-select:none;white-space:nowrap;top:6px;}
.tick.month-tick{color:var(--text3);opacity:0.7;}
.tick-line{position:absolute;top:0;bottom:0;width:0.5px;background:var(--border);}
.nick-col{width:130px;min-width:130px;flex-shrink:0;}
.gen-row{display:flex;align-items:center;border-bottom:0.5px solid var(--border);transition:opacity 0.2s;}
.gen-row:last-child{border-bottom:none;}
.gen-row.dimmed{opacity:0.1;pointer-events:none;}
.gen-meta{width:165px;min-width:165px;text-align:right;padding:6px 14px 6px 0;cursor:pointer;flex-shrink:0;}
.gen-meta:hover .gen-name{color:#185FA5;}
.gen-name{font-size:12px;font-weight:600;color:var(--text);transition:color 0.15s;line-height:1.3;}
.gen-yr{font-size:10px;color:var(--text3);}
.bar-area{flex:1;position:relative;height:34px;overflow:hidden;cursor:grab;user-select:none;}
.bar-area:active{cursor:grabbing;}
.bar-bg{position:absolute;inset:0;background:var(--bg2);}
.vgrid{position:absolute;top:0;bottom:0;width:0.5px;background:var(--border);pointer-events:none;}
.bar{position:absolute;top:3px;height:calc(100% - 6px);border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:10px;font-weight:600;transition:filter 0.1s;pointer-events:none;overflow:hidden;white-space:nowrap;}
.bar.selected{outline:2.5px solid var(--text);outline-offset:1px;}
.now-line{position:absolute;top:0;bottom:0;width:2px;background:#e05c30;pointer-events:none;z-index:5;border-radius:2px;}
.now-label{position:absolute;top:-1px;font-size:8px;color:#e05c30;transform:translateX(-50%);font-weight:700;white-space:nowrap;background:var(--bg2);padding:0 2px;border-radius:2px;}
.right-nick{width:130px;min-width:130px;padding-left:10px;font-size:10px;color:var(--text3);display:flex;align-items:center;flex-shrink:0;}
.micro-tag{display:inline-block;font-size:8px;padding:1px 5px;border-radius:3px;background:#FAEEDA;color:#BA7517;border:1px solid #EF9F27;margin-left:4px;vertical-align:middle;font-weight:700;}

/* DETAIL */
.detail-panel{border:1px solid var(--border2);border-radius:var(--radius);padding:1.25rem 1.5rem;background:var(--bg);margin-bottom:1rem;animation:fadeIn 0.2s ease;}
.detail-panel.hidden{display:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.detail-dot{width:16px;height:16px;border-radius:4px;flex-shrink:0;}
.detail-title{font-size:18px;font-weight:700;color:var(--text);}
.detail-subtitle{font-size:11px;color:var(--text2);margin-top:2px;}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.stat-card{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 14px;}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em;}
.stat-value{font-size:22px;font-weight:700;color:var(--text);}
.stat-unit{font-size:11px;color:var(--text2);font-weight:400;}
.detail-desc{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:12px;}
.traits-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.trait{font-size:11px;padding:4px 10px;border-radius:14px;border:1px solid var(--border);color:var(--text2);background:var(--bg2);}
.events-label{font-size:10px;color:var(--text3);line-height:1.7;}
.hint{text-align:center;font-size:11px;color:var(--text3);margin-bottom:0.75rem;}
.footnote{text-align:center;font-size:10px;color:var(--text3);line-height:1.7;padding:1rem 0 0.5rem;border-top:1px solid var(--border);margin-top:0.5rem;}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="app-eyebrow" id="h-eyebrow"></div>
    <div class="app-title" id="h-title"></div>
    <div class="app-sub" id="h-sub"></div>

    <!-- ZOOM CONTROLS -->
    <div class="zoom-bar">

      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <span class="zoom-label" id="zoomLabel">1×</span>
      <button class="zoom-reset" onclick="resetZoom()">Reset</button>

    <div class="timeline-wrap">

        <div class="tick-area" id="ticks"></div>
        <div class="nick-col"></div>
      </div>

    </div>

    <div class="detail-panel hidden" id="detail">
      <div class="detail-header">
        <div class="detail-dot" id="d-dot"></div>
        <div>
          <div class="detail-title" id="d-title"></div>
          <div class="detail-subtitle" id="d-sub"></div>

      <div class="detail-grid" id="d-stats"></div>
      <div class="detail-desc" id="d-desc"></div>
      <div class="traits-wrap" id="d-traits"></div>
      <div class="events-label" id="d-events"></div>
    </div>
    <div class="footnote" id="ui-footnote"></div>
  </div>
</div>

// ─── ZOOM / PAN ────────────────────────────────────────────────────────────
const MIN_ZOOM=1, MAX_ZOOM=200;

function clampPan(){
  const maxPan = 1 - 1/zoom;
  panOffset = Math.max(0, Math.min(maxPan, panOffset));
}

// Convert a fractional position (0..1 of total range) to screen % within viewport
function toScreen(frac){ return (frac - panOffset) * zoom * 100; }
// Convert a year to fraction
function yearToFrac(y){ return (y - TOTAL_START) / TOTAL_RANGE; }
// Convert fraction to year (float)
function fracToYear(f){ return TOTAL_START + f * TOTAL_RANGE; }

function zoomIn(){ setZoom(zoom * 1.5); }
function zoomOut(){ setZoom(zoom / 1.5); }
function resetZoom(){ setZoom(1); panOffset=0; renderAll(); }

function onSlider(v){
  const newZoom = Math.pow(MAX_ZOOM, (v-1)/199);
  setZoom(newZoom, false);
}

function setZoom(newZoom, updateSlider=true){
  // zoom toward center of current view
  const centerFrac = panOffset + 0.5/zoom;
  zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, newZoom));
  panOffset = centerFrac - 0.5/zoom;
  clampPan();
  if(updateSlider){
    const sliderVal = 1 + Math.log(zoom)/Math.log(MAX_ZOOM)*199;
    document.getElementById('zoomSlider').value = sliderVal;
  }
  document.getElementById('zoomLabel').textContent = zoom.toFixed(zoom<10?1:0)+'×';
  renderAll();
}

// ─── TICKS ──────────────────────────────────────────────────────────────────
function buildTicks(){
  const ticksEl = document.getElementById('ticks');
  ticksEl.innerHTML='';

  const viewStart = fracToYear(panOffset);
  const viewEnd   = fracToYear(panOffset + 1/zoom);
  const viewSpan  = viewEnd - viewStart;

  let ticks=[];

  if(viewSpan > 80){
    // decade ticks
    const step = viewSpan>200?20:10;
    const first = Math.ceil(viewStart/step)*step;
    for(let y=first; y<=viewEnd; y+=step) ticks.push({year:y,label:String(y),major:true});
  } else if(viewSpan > 15){
    // year ticks
    const step = viewSpan>40?5:1;
    const first = Math.ceil(viewStart/step)*step;
    for(let y=first; y<=viewEnd; y+=step) ticks.push({year:y,label:String(y),major:true});
  } else if(viewSpan > 3){
    // year + half-year
    const first = Math.ceil(viewStart);
    for(let y=first-1; y<=viewEnd+1; y++){
      ticks.push({year:y,label:String(y),major:true});
      ticks.push({year:y+0.5,label:'Jun',major:false});
    }
  } else {
    // month ticks
    const startYear = Math.floor(viewStart);
    const endYear   = Math.ceil(viewEnd);
    for(let y=startYear; y<=endYear; y++){
      for(let m=0;m<12;m++){
        const ym = y + m/12;
        if(ym>=viewStart-0.1 && ym<=viewEnd+0.1){
          ticks.push({year:ym, label: m===0?String(y):MONTHS[m], major:m===0});
        }
      }
    }
  }

  ticks.forEach(tk=>{
    const pct = toScreen(yearToFrac(tk.year));
    if(pct<-5||pct>105) return;
    const el=document.createElement('span');
    el.className='tick'+(tk.major?'':' month-tick');
    el.style.left=pct+'%';
    el.textContent=tk.label;
    ticksEl.appendChild(el);

    const line=document.createElement('div');
    line.className='tick-line';
    line.style.left=pct+'%';
    line.style.opacity=tk.major?'1':'0.4';
    ticksEl.appendChild(line);
  });
}

// ─── ROWS ───────────────────────────────────────────────────────────────────
function renderRows(){
  const rowsEl=document.getElementById('rows');
  rowsEl.innerHTML='';
  const t=i18n[lang];
  const nowScreen = toScreen(yearToFrac(NOW));

  gens.forEach(g=>{
    const leftPct  = toScreen(yearToFrac(g.start));
    const rightPct = toScreen(yearToFrac(g.end));
    const widthPct = rightPct - leftPct;
    const span=g.end-g.start;
    const name=lang==='en'?g.name_en:g.name_pl;
    const nick=lang==='en'?g.nick_en:g.nick_pl;

    const row=document.createElement('div');
    row.className='gen-row';
    row.id='row-'+g.id;

    const barVisible = rightPct>0 && leftPct<100;
    const barLabel = widthPct>12 ? (span>=1?span+t.yrs:'') : '';

    row.innerHTML=`
      <div class="gen-meta" onclick="selectGen('${g.id}')">
        <div class="gen-name">${name}${g.micro?'<span class="micro-tag">micro</span>':''}</div>
        <div class="gen-yr">${g.start}–${g.end}</div>
      </div>
      <div class="bar-area" id="ba-${g.id}">
        <div class="bar-bg"></div>
        ${barVisible?`
        <div class="now-line" style="left:${nowScreen}%"><span class="now-label">${t.now}</span></div>
        <div class="bar ${selectedId===g.id?'selected':''}" style="left:${leftPct}%;width:${widthPct}%;background:${g.color};color:${g.text};">${barLabel}</div>
        `:`<div class="now-line" style="left:${nowScreen}%"></div>`}
      </div>
      <div class="right-nick">${nick}</div>
    `;
    rowsEl.appendChild(row);

    // click on bar
    row.querySelector('.bar-area').addEventListener('click', e=>{
      if(!isDragging) selectGen(g.id);
    });
  });

  // pan/zoom on bar areas via mouse wheel
  document.querySelectorAll('.bar-area').forEach(el=>{
    el.addEventListener('wheel', onWheel, {passive:false});
    el.addEventListener('mousedown', onMouseDown);
  });
  document.getElementById('ticks').addEventListener('wheel', onWheel, {passive:false});
  document.getElementById('ticks').addEventListener('mousedown', onMouseDown);
}

function renderAll(){
  buildTicks();
  renderRows();
}

// ─── PAN / ZOOM MOUSE EVENTS ────────────────────────────────────────────────
let didDrag=false;
function onWheel(e){
  e.preventDefault();
  const rect = e.currentTarget.getBoundingClientRect();
  const relX = (e.clientX - rect.left) / rect.width; // 0..1
  const frac = panOffset + relX/zoom;
  const delta = e.deltaY > 0 ? 0.8 : 1.25;
  const newZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom*delta));
  panOffset = frac - relX/newZoom;
  zoom = newZoom;
  clampPan();
  const sliderVal = 1 + Math.log(zoom)/Math.log(MAX_ZOOM)*199;
  document.getElementById('zoomSlider').value = sliderVal;
  document.getElementById('zoomLabel').textContent = zoom.toFixed(zoom<10?1:0)+'×';
  renderAll();
}

function onMouseDown(e){
  if(e.button!==0) return;
  isDragging=true; didDrag=false;
  dragStartX=e.clientX;
  dragStartPan=panOffset;
  const el=e.currentTarget;
  const barAreaWidth=el.getBoundingClientRect().width;
  function onMove(ev){
    const dx=ev.clientX-dragStartX;
    const dfrac=-(dx/barAreaWidth)/zoom;
    if(Math.abs(dx)>3) didDrag=true;
    panOffset=dragStartPan+dfrac;
    clampPan();
    renderAll();
  }
  function onUp(){
    isDragging=false;
    window.removeEventListener('mousemove',onMove);
    window.removeEventListener('mouseup',onUp);
  }
  window.addEventListener('mousemove',onMove);
  window.addEventListener('mouseup',onUp);
}

// ─── TOUCH SUPPORT ──────────────────────────────────────────────────────────
let lastTouchDist=null, lastTouchMidFrac=null;
document.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const midX=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const el=document.querySelector('.bar-area');
    if(el){
      const rect=el.getBoundingClientRect();
      const relX=(midX-rect.left)/rect.width;
      lastTouchMidFrac=panOffset+relX/zoom;
    }
  }
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&lastTouchDist){
    e.preventDefault();
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const scale=dist/lastTouchDist;
    const midX=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const el=document.querySelector('.bar-area');
    if(el){
      const rect=el.getBoundingClientRect();
      const relX=(midX-rect.left)/rect.width;
      const newZoom=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,zoom*scale));
      panOffset=lastTouchMidFrac-relX/newZoom;
      zoom=newZoom;
      clampPan();
      renderAll();
    }
    lastTouchDist=dist;
  }
},{passive:false});
document.addEventListener('touchend',()=>{ lastTouchDist=null; },{passive:true});

// ─── SELECT GEN ─────────────────────────────────────────────────────────────
function selectGen(id){
  selectedId=id;
  const g=gens.find(x=>x.id===id);
  const t=i18n[lang];
  const panel=document.getElementById('detail');
  panel.classList.remove('hidden');
  document.getElementById('d-dot').style.background=g.color;
  document.getElementById('d-title').textContent=lang==='en'?g.name_en:g.name_pl;
  document.getElementById('d-sub').textContent=(lang==='en'?g.nick_en:g.nick_pl)+' · '+g.start+'–'+g.end;
  const span=g.end-g.start;
  const age1=Math.max(0,NOW-g.end);
  const age2=NOW-g.start;
  const eraLabel=g.start<1946?t.prewar:g.start<1997?t.coldwar:t.digital;
  document.getElementById('d-stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">${t.birthSpan}</div><div class="stat-value">${span}<span class="stat-unit">${t.yrs}</span></div></div>
    <div class="stat-card"><div class="stat-label">${t.ageRange}</div><div class="stat-value" style="font-size:16px;">${age1}–${age2}<span class="stat-unit">${t.yrs}</span></div></div>
    <div class="stat-card"><div class="stat-label">${t.era}</div><div class="stat-value" style="font-size:15px;">${eraLabel}</div></div>
  `;
  document.getElementById('d-desc').textContent=lang==='en'?g.desc_en:g.desc_pl;
  const traits=lang==='en'?g.traits_en:g.traits_pl;
  document.getElementById('d-traits').innerHTML=traits.map(tr=>`<span class="trait">${tr}</span>`).join('');
  const events=lang==='en'?g.events_en:g.events_pl;
  document.getElementById('d-events').textContent=t.keyEvents+events.join(' · ');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  renderAll();
}

// ─── UI / LANG ───────────────────────────────────────────────────────────────
function updateUI(){
  const t=i18n[lang];
  document.getElementById('h-eyebrow').textContent=t.eyebrow;
  document.getElementById('h-title').textContent=t.title;
  document.getElementById('h-sub').textContent=t.sub;
  document.getElementById('btn-all').textContent=t.btnAll;
  document.getElementById('btn-pre').textContent=t.btnPre;
  document.getElementById('btn-mid').textContent=t.btnMid;
  document.getElementById('btn-new').textContent=t.btnNew;
  document.getElementById('btn-micro').textContent=t.btnMicro;
  document.getElementById('ui-hint').textContent=t.hint;
  document.getElementById('zoom-hint').textContent=t.zoomHint;
  document.getElementById('ui-footnote').innerHTML=t.footnote;
  renderAll();
  if(selectedId) selectGen(selectedId);
}
function setLang(l,btn){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  updateUI();
}
function filterAll(btn){
  document.querySelectorAll('.gen-row').forEach(r=>r.classList.remove('dimmed'));
  setActive(btn);
}
function filterEra(era,btn){
  const map={pre:['lost','greatest','silent'],mid:['boomers','genx','millennials'],new:['zillenials','genz','alpha','beta']};
  gens.forEach(g=>{const r=document.getElementById('row-'+g.id);if(r)r.classList.toggle('dimmed',!map[era].includes(g.id));});
  setActive(btn);
}
function filterMicro(btn){
  gens.forEach(g=>{const r=document.getElementById('row-'+g.id);if(r)r.classList.toggle('dimmed',!g.micro);});
  setActive(btn);
}
function setActive(btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

updateUI();
</script>
